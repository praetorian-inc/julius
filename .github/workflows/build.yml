name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the build (e.g., v1.0.0)'
        required: false
        default: 'dev'

env:
  GO_VERSION: '1.25'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all platforms
        run: make release VERSION=${{ github.event.inputs.version }}

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Upload Linux amd64
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: julius-linux-amd64
          path: dist/julius-linux-amd64

      - name: Upload Linux arm64
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: julius-linux-arm64
          path: dist/julius-linux-arm64

      - name: Upload macOS amd64
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: julius-darwin-amd64
          path: dist/julius-darwin-amd64

      - name: Upload macOS arm64
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: julius-darwin-arm64
          path: dist/julius-darwin-arm64

      - name: Upload Windows amd64
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: julius-windows-amd64
          path: dist/julius-windows-amd64.exe

      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checksums
          path: dist/checksums.txt
