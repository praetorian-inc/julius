name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly baseline
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: praetorian-inc/public-workflows/.github/workflows/go-security.yml@135c50049eeef6e664bd7ea4aacaa33118083e30  # v2.0.10
    permissions:
      contents: read
      security-events: write
    secrets: inherit
