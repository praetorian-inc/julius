# probes/aws-bedrock.yaml
# Reference: https://docs.aws.amazon.com/bedrock/latest/APIReference/welcome.html
name: aws-bedrock
description: AWS Bedrock - cloud-managed LLM service with foundation model hosting and inference (control plane)
category: cloud-managed
port_hint: 443
specificity: 85
require: all
api_docs: https://docs.aws.amazon.com/bedrock/latest/APIReference/welcome.html

requests:
  # Bedrock control plane ListFoundationModels endpoint.
  # /foundation-models is Bedrock-specific — no other AWS service uses this path.
  # Without SigV4 auth, returns 403 with {"Message":"Authorization header is missing"}.
  - type: http
    path: /foundation-models
    method: GET
    match:
      - type: status
        value: 403
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"Message"'
      - type: body.contains
        value: 'Authorization header'

  # Bedrock control plane guardrails endpoint.
  # /guardrails is also Bedrock-specific. Requiring both paths to return the
  # same AWS auth error greatly reduces false positives from generic 403 pages.
  - type: http
    path: /guardrails
    method: GET
    match:
      - type: status
        value: 403
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"Message"'
      - type: body.contains
        value: 'Authorization header'
models:
  path: /foundation-models
  method: GET
  extract: ".modelSummaries[].modelId"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
