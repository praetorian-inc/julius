# probes/azure-openai.yaml
# Reference: https://learn.microsoft.com/en-us/azure/foundry/openai/reference
name: azure-openai
description: Azure OpenAI Service (Microsoft Foundry)
category: cloud-managed
port_hint: 443
specificity: 92
api_docs: https://learn.microsoft.com/en-us/azure/foundry/openai/reference

require: all

requests:
  # Azure-specific /openai/models path with mandatory api-version query param.
  # Without a valid api-key header, Azure returns 401 with a distinctive error:
  # "Access denied due to invalid subscription key or wrong API endpoint"
  - type: http
    path: /openai/models?api-version=2024-10-21
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: "Access denied due to invalid subscription key"

  # Same detection via deployments path. Requiring both paths to return the
  # same Azure-specific error confirms this is Azure OpenAI, not a docs page.
  - type: http
    path: /openai/deployments?api-version=2024-10-21
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: "Access denied due to invalid subscription key"

models:
  path: /openai/models?api-version=2024-10-21
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
