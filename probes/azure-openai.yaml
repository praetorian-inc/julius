# probes/azure-openai.yaml
# Reference: https://learn.microsoft.com/en-us/azure/foundry/openai/reference
name: azure-openai
description: Azure OpenAI Service (Microsoft Foundry)
category: cloud-managed
port_hint: 443
specificity: 92
api_docs: https://learn.microsoft.com/en-us/azure/foundry/openai/reference

requests:
  # Azure-specific /openai/models path with mandatory api-version query param.
  # Without a valid api-key header, Azure returns 401 with a distinctive error
  # body containing "subscription key" — unique to Azure Cognitive Services.
  # Regular OpenAI uses /v1/models and never mentions "subscription key".
  - type: http
    path: /openai/models?api-version=2024-10-21
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: "subscription key"

  # Same detection via the deployments-scoped completions path, which is
  # structurally unique to Azure OpenAI (/openai/deployments/{id}/...).
  # A 404 or 401 with the same Azure error envelope confirms the service.
  - type: http
    path: /openai/deployments?api-version=2024-10-21
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: "subscription key"

  # Azure API Management layer sometimes returns statusCode field instead.
  # Matches the APIM-wrapped variant of the same 401 error.
  - type: http
    path: /openai/models?api-version=2024-10-21
    method: GET
    match:
      - type: status
        value: 401
      - type: body.contains
        value: '"statusCode"'
      - type: body.contains
        value: "cognitiveservices.azure.com"

models:
  path: /openai/models?api-version=2024-10-21
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
