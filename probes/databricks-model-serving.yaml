# probes/databricks-model-serving.yaml
# Reference: https://docs.databricks.com/api/workspace/servingendpoints
name: databricks-model-serving
description: Databricks Model Serving endpoints for real-time ML inference
category: cloud-managed
port_hint: 443
specificity: 82
api_docs: https://docs.databricks.com/api/workspace/servingendpoints

require: all

requests:
  # Databricks Serving Endpoints API — /api/2.0/serving-endpoints is Databricks-unique.
  # Without auth, returns 401 with {"error_code": 401, "message": "Missing authorization
  # details for accessing model serving endpoints"}.
  - type: http
    path: /api/2.0/serving-endpoints
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"error_code"'
      - type: body.contains
        value: "serving endpoint"

  # Databricks metrics endpoint under serving-endpoints namespace.
  # Requiring both Databricks-specific paths to return 401 + "error_code"
  # eliminates false positives from sites that happen to 401 on one path.
  - type: http
    path: /api/2.0/serving-endpoints/_/metrics
    method: GET
    match:
      - type: status
        value: 401
      - type: body.contains
        value: '"error_code"'

models:
  path: /api/2.0/serving-endpoints
  method: GET
  extract: ".endpoints[].name"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
