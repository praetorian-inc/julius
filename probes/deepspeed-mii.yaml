# probes/deepspeed-mii.yaml
# Reference: https://github.com/deepspeedai/DeepSpeed-MII
name: deepspeed-mii
description: DeepSpeed-MII - high-throughput LLM inference powered by DeepSpeed
category: self-hosted
port_hint: 28080
specificity: 80
api_docs: https://github.com/deepspeedai/DeepSpeed-MII

requests:
  # Legacy/persistent deployment: Flask gateway with /mii/{deployment} path prefix.
  # The "/mii/" prefix is defined as RESTFUL_API_PATH constant in mii/constants.py
  # and is unique to DeepSpeed-MII. Any POST to /mii/* that returns JSON is a match.
  # /healthz also exists but returns plain "ok" which is too generic on its own.
  - type: http
    path: /healthz
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "ok"
      - type: header.contains
        header: Server
        value: "Werkzeug"

  # Newer FastAPI-based entrypoint (mii.entrypoints.api_server).
  # /health returns {"status":"ok"} with uvicorn header.
  # We match the specific "ok" value to exclude other services (e.g., Open WebUI
  # returns {"status":true}) and exclude vLLM's /version endpoint.
  - type: http
    path: /health
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"status":"ok"'
      - type: header.contains
        header: Server
        value: "uvicorn"
      - type: body.contains
        not: true
        value: '"healthy_endpoints"'
      - type: body.contains
        not: true
        value: '"version"'
