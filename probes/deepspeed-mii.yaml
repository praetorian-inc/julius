# probes/deepspeed-mii.yaml
# Reference: https://github.com/deepspeedai/DeepSpeed-MII
name: deepspeed-mii
description: DeepSpeed-MII - high-throughput LLM inference powered by DeepSpeed
category: self-hosted
port_hint: 28080
specificity: 90
api_docs: https://github.com/deepspeedai/DeepSpeed-MII

requests:
  # OpenAI-compatible server: /v1/models returns owned_by: "deepspeed-mii"
  # Hardcoded in mii/entrypoints/data_models.py ModelCard class.
  - type: http
    path: /v1/models
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"deepspeed-mii"'

  # Legacy Flask gateway: POST /mii/deepspeed-mii uses the default deployment name.
  # RESTFUL_API_PATH="mii" in constants.py, default deployment_name="deepspeed-mii".
  - type: http
    path: /mii/deepspeed-mii
    method: POST
    headers:
      Content-Type: application/json
    body: '{"prompts": ["test"]}'
    match:
      - type: body.contains
        value: '"text"'

models:
  path: /v1/models
  method: GET
  extract: ".data[].id"
