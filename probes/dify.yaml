# probes/dify.yaml
# Reference: https://docs.dify.ai
name: dify
description: Dify - Open-source LLM app development platform with workflow orchestration
category: rag-orchestration
port_hint: 80
specificity: 90
api_docs: https://docs.dify.ai

requests:
  # Primary: /apps page contains Dify-specific body data attributes.
  # data-public-edition and /console/api path are present across all Dify
  # versions (old <title>Dify</title> detection broke on newer JS-rendered versions,
  # and marketplace.dify.ai is absent in pre-marketplace versions).
  - type: http
    path: /apps
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: 'data-public-edition'
      - type: body.contains
        value: '/console/api'

  # Secondary: root / redirects to /apps (307) or serves directly.
  # Some deployments serve the app at root with the same Dify markers.
  - type: http
    path: /
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: 'data-public-edition'
      - type: body.contains
        value: '/console/api'
