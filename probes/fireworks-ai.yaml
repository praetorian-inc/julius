# probes/fireworks-ai.yaml
# Reference: https://docs.fireworks.ai/api-reference/introduction
name: fireworks-ai
description: Fireworks AI - cloud inference platform for LLMs with OpenAI-compatible API
category: cloud-managed
port_hint: 443
specificity: 85
api_docs: https://docs.fireworks.ai/api-reference/introduction

requests:
  # Fireworks uses /inference/v1/ prefix — unique among OpenAI-compatible providers.
  # GET on the models endpoint returns model list with Fireworks-specific model IDs
  # containing "accounts/fireworks/models/" prefix.
  - type: http
    path: /inference/v1/models
    method: GET
    match:
      - type: body.contains
        value: "accounts/fireworks/models/"

  # The native Fireworks model listing endpoint path is unique to Fireworks.
  # Querying the public "fireworks" account models list returns model objects
  # with the distinctive name format.
  - type: http
    path: /v1/accounts/fireworks/models
    method: GET
    match:
      - type: body.contains
        value: "accounts/fireworks/models/"


  # Without auth, /inference/v1/models returns a Fireworks-specific error
  # containing docs.fireworks.ai URL. The /inference/v1/ path prefix plus
  # the Fireworks docs URL is a strong fingerprint.
  - type: http
    path: /inference/v1/models
    method: GET
    match:
      - type: body.contains
        value: "docs.fireworks.ai"

models:
  path: /inference/v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET/inference/v1"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
