# probes/groq.yaml
# Reference: https://console.groq.com/docs/api-reference
name: groq
description: Groq Cloud LPU Inference API (OpenAI-compatible at /openai/v1/ path)
category: cloud-managed
port_hint: 443
specificity: 80
api_docs: https://console.groq.com/docs/api-reference

requests:
  # Groq returns x-groq-region header on all responses (added by Groq's
  # infrastructure, survives reverse proxy forwarding). Combined with 401 +
  # "invalid_api_key" on the Groq-specific /openai/v1/ path prefix.
  - type: http
    path: /openai/v1/models
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"invalid_api_key"'
      - type: header.contains
        header: x-groq-region
        value: ""

  # Some proxies expose Groq at root. The welcome message + x-groq-region
  # header is a strong fingerprint even without the /openai/v1/ path.
  - type: http
    path: /
    method: GET
    match:
      - type: body.contains
        value: "Welcome to the Groq API"
      - type: header.contains
        header: x-groq-region
        value: ""

models:
  path: /openai/v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
