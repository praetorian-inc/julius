# probes/huggingface-tgi.yaml
name: huggingface-tgi
description: HuggingFace Text Generation Inference
category: self-hosted
port_hint: 3000
specificity: 75
api_docs: https://huggingface.co/docs/text-generation-inference/

requests:
  # /info returns TGI-specific fields including model_dtype, docker_label,
  # and max_batch_total_tokens alongside model_id. The combination of these
  # fields on /info is unique to TGI.
  - type: http
    path: /info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"model_id"'
      - type: body.contains
        value: '"model_dtype"'
      - type: body.contains
        value: '"max_batch_total_tokens"'
      - type: body.contains
        value: '"docker_label"'

models:
  path: /info
  method: GET
  extract: "[.model_id]"

augustus:
  generator: rest
  config_template:
    endpoint: "$TARGET/generate"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"inputs": "$PROMPT", "parameters": {"max_new_tokens": 512}}'
    response_path: "generated_text"
