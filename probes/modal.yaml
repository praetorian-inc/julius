# probes/modal.yaml
# Reference: https://modal.com/docs/guide/webhooks
name: modal
description: Modal serverless AI platform (LLM serving via vLLM/FastAPI)
category: cloud-managed
port_hint: 443
specificity: 95
api_docs: https://modal.com/docs/guide/webhooks

requests:
  # Modal's HTTP infrastructure returns "modal-http: invalid function call"
  # on any 404. Requesting a guaranteed-invalid path triggers this on all
  # Modal endpoints (active, stopped, or misconfigured).
  - type: http
    path: /praetorian-nonexistent-probe-path
    method: GET
    match:
      - type: status
        value: 404
      - type: body.contains
        value: "modal-http: invalid function call"

models:
  path: /v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
