# probes/omniroute.yaml
# Reference: https://github.com/diegosouzapw/OmniRoute/blob/main/docs/API_REFERENCE.md
name: omniroute
description: OmniRoute - AI gateway for multi-provider LLMs with smart routing, load balancing, caching, and observability
category: gateway
port_hint: 20128
specificity: 90
require: all
api_docs: https://github.com/diegosouzapw/OmniRoute/blob/main/docs/API_REFERENCE.md

requests:
  # /api/cache returns OmniRoute's two-tier cache stats with "semanticCache".
  # X-OmniRoute-Cache header is documented on all OmniRoute responses.
  - type: http
    path: /api/cache
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "semanticCache"
      - type: header.contains
        header: X-OmniRoute-Cache
        value: ""

  # /api/acp/agents returns OmniRoute's ACP agent list with "isCustom".
  - type: http
    path: /api/acp/agents
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "isCustom"
      - type: header.contains
        header: X-OmniRoute-Cache
        value: ""


models:
  path: /v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET/v1"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
