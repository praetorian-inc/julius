# probes/petals.yaml
# Reference: https://github.com/petals-infra/chat.petals.dev
name: petals
description: Petals - decentralized LLM inference, BitTorrent-style distributed serving
category: self-hosted
port_hint: 5000
specificity: 80
api_docs: https://github.com/bigscience-workshop/petals

requests:
  # Health monitor: /api/v1/state returns swarm state JSON with model_reports and bootstrap_states
  # These keys are unique to Petals health monitor (health.petals.dev)
  - type: http
    path: /api/v1/state
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"model_reports"'
      - type: body.contains
        value: '"bootstrap_states"'

  # Health monitor: /api/v1/state also contains reachability_issues (Petals swarm-specific)
  - type: http
    path: /api/v1/state
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"model_reports"'
      - type: body.contains
        value: '"reachability_issues"'

  # Prometheus metrics from health monitor contain Petals-specific metrics
  - type: http
    path: /api/prometheus
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "servers_num_total"
      - type: body.contains
        value: "blocks_online_min"

  # Chat API: /api/v1/generate error response leaks petals/hivemind traceback
  # A GET or empty POST to the generate endpoint returns {"ok": false, "traceback": "..."}
  # with petals or hivemind in the traceback stack
  - type: http
    path: /api/v1/generate
    method: POST
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"ok"'
      - type: body.contains
        value: '"traceback"'
