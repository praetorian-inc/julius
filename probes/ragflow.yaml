# probes/ragflow.yaml
# Reference: https://ragflow.io/docs/dev/run_health_check
# Source: github.com/infiniflow/ragflow api/apps/system_app.py
name: ragflow
description: RAGFlow - Open-source RAG engine by InfiniFlow with deep document understanding
category: rag-orchestration
port_hint: 80
specificity: 90
require: all
api_docs: https://ragflow.io/docs/http_api_reference

requests:
  # Unauthenticated health check with RAGFlow-unique "doc_engine" field
  # Returns: {"db":"ok","redis":"ok","doc_engine":"ok","storage":"ok","status":"ok"}
  - type: http
    path: /v1/system/healthz
    method: GET
    match:
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"doc_engine"'

  # Web UI serves SPA with <title>RAGFlow</title>
  # Verified from web/index.html in source repository
  - type: http
    path: /
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "<title>RAGFlow</title>"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
