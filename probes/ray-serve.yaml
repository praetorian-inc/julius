# probes/ray-serve.yaml
# Reference: https://docs.ray.io/en/latest/serve/api/index.html
name: ray-serve
description: Ray Serve scalable model serving on Ray cluster
category: self-hosted
port_hint: 8265
specificity: 85
api_docs: https://docs.ray.io/en/latest/serve/api/index.html

requests:
  # Ray dashboard API (port 8265): GET /api/serve/applications/
  # Returns ServeInstanceDetails with Ray Serve-specific fields and actor names.
  - type: http
    path: /api/serve/applications/
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"controller_info"'
      - type: body.contains
        value: '"proxy_location"'
      - type: body.contains
        value: "SERVE_CONTROLLER_ACTOR"
      - type: body.contains
        value: '"deploy_mode"'
