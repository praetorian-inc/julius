# probes/replicate.yaml
# Reference: https://replicate.com/docs/reference/http
name: replicate
description: Replicate cloud ML platform with prediction-based API
category: cloud-managed
port_hint: 443
specificity: 85
require: all
api_docs: https://replicate.com/docs/reference/http

requests:
  # Replicate is cloud-only (api.replicate.com). All endpoints return 401
  # without auth using RFC 7807 Problem Details format (application/problem+json).
  # /v1/hardware is a Replicate-unique path (hardware SKU listing).
  - type: http
    path: /v1/hardware
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/problem+json
      - type: body.contains
        value: '"Unauthenticated"'

  # /v1/predictions is the core Replicate endpoint. Requiring both
  # Replicate-specific paths to return the same RFC 7807 401 error
  # eliminates false positives from other APIs using Problem Details.
  - type: http
    path: /v1/predictions
    method: GET
    match:
      - type: status
        value: 401
      - type: content-type
        value: application/problem+json
      - type: body.contains
        value: '"Unauthenticated"'

models:
  path: /v1/models
  method: GET
  extract: ".results[] | .owner + \"/\" + .name"

augustus:
  generator: rest
  config_template:
    endpoint: "$TARGET/v1/models/$MODEL/predictions"
    method: POST
    api_key: "$API_KEY"
    headers:
      Content-Type: application/json
      Prefer: wait=60
    body: '{"input": {"prompt": "$PROMPT"}}'
    response_path: "output"
    timeout: 180
