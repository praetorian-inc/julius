# probes/sglang.yaml
# Reference: https://docs.sglang.io/basic_usage/native_api.html
name: sglang
description: SGLang Runtime - high-performance LLM serving engine
category: self-hosted
port_hint: 30000
specificity: 90
api_docs: https://docs.sglang.io/basic_usage/native_api.html

requests:
  # SGLang-native /server_info endpoint (new canonical name).
  # Older versions (<=0.4.x) return a compact JSON; newer versions dump full server args.
  # mem_fraction_static + disaggregation_mode are present in both and unique to SGLang.
  - type: http
    path: /server_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"mem_fraction_static"'
      - type: body.contains
        value: '"disaggregation_mode"'

  # Deprecated alias — still present in current versions, same response.
  - type: http
    path: /get_server_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"mem_fraction_static"'
      - type: body.contains
        value: '"disaggregation_mode"'

  # SGLang-native /model_info endpoint.
  # Returns is_generation, has_image_understanding, has_audio_understanding —
  # a combination unique to SGLang.
  - type: http
    path: /model_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"is_generation"'
      - type: body.contains
        value: '"has_image_understanding"'
      - type: body.contains
        value: '"has_audio_understanding"'

  # Deprecated alias for /model_info.
  - type: http
    path: /get_model_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"is_generation"'
      - type: body.contains
        value: '"has_image_understanding"'
      - type: body.contains
        value: '"has_audio_understanding"'

  # OpenAI-compat /v1/models returns owned_by: "sglang" — hardcoded in
  # sglang/srt/entrypoints/openai/protocol.py ModelCard class.
  # Catches instances where native endpoints may be disabled.
  - type: http
    path: /v1/models
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"owned_by":"sglang"'

  # Same check, tolerates whitespace in JSON serialization
  - type: http
    path: /v1/models
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"owned_by": "sglang"'

models:
  path: /v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "not-needed"
    timeout: 180
