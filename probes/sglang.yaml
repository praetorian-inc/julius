# probes/sglang.yaml
# Reference: https://docs.sglang.io/basic_usage/native_api.html
name: sglang
description: SGLang Runtime - high-performance LLM serving engine
category: self-hosted
port_hint: 30000
specificity: 90
api_docs: https://docs.sglang.io/basic_usage/native_api.html

requests:
  # SGLang-native /server_info endpoint (new canonical name).
  # Returns a large JSON with SGLang-unique fields like radix_eviction_policy,
  # chunked_prefill_size, mem_fraction_static, and a "version" field.
  - type: http
    path: /server_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"radix_eviction_policy"'
      - type: body.contains
        value: '"mem_fraction_static"'
      - type: body.contains
        value: '"chunked_prefill_size"'

  # Deprecated alias — still present in current versions, same response.
  - type: http
    path: /get_server_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"radix_eviction_policy"'
      - type: body.contains
        value: '"mem_fraction_static"'
      - type: body.contains
        value: '"chunked_prefill_size"'

  # SGLang-native /model_info endpoint.
  # Returns is_generation, has_image_understanding, has_audio_understanding —
  # a combination unique to SGLang.
  - type: http
    path: /model_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"is_generation"'
      - type: body.contains
        value: '"has_image_understanding"'
      - type: body.contains
        value: '"has_audio_understanding"'

  # Deprecated alias for /model_info.
  - type: http
    path: /get_model_info
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"is_generation"'
      - type: body.contains
        value: '"has_image_understanding"'
      - type: body.contains
        value: '"has_audio_understanding"'

models:
  path: /v1/models
  method: GET
  extract: ".data[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "not-needed"
    timeout: 180
