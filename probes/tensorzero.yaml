# probes/tensorzero.yaml
# Reference: https://www.tensorzero.com/docs/deployment/tensorzero-gateway
name: tensorzero
description: TensorZero Gateway - open-source Rust-based LLM gateway with observability, optimization, and experimentation
category: gateway
port_hint: 3000
specificity: 90
api_docs: https://www.tensorzero.com/docs/gateway/api-reference/inference

requests:
  # Primary fingerprint: Prometheus metrics endpoint exposes tensorzero-prefixed metrics
  # tensorzero_inferences_total and tensorzero_inference_latency_overhead_seconds are unique
  - type: http
    path: /metrics
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "tensorzero_inferences_total"

  # Secondary fingerprint: /health returns JSON with "gateway" key (TensorZero-specific shape)
  # Response: {"gateway": "ok", "postgres": "ok"} or {"gateway": "ok", "clickhouse": "ok"}
  - type: http
    path: /health
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"gateway"'
      - type: body.contains
        value: '"ok"'
      # Exclude LiteLLM which also uses /health but returns "healthy_endpoints"
      - type: body.contains
        value: '"healthy_endpoints"'
        not: true

  # Tertiary fingerprint: /metrics with the latency overhead histogram metric
  - type: http
    path: /metrics
    method: GET
    match:
      - type: status
        value: 200
      - type: body.contains
        value: "tensorzero_inference_latency_overhead_seconds"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET/openai/v1"
    model: "$MODEL"
    api_key: "not-needed"
    timeout: 180
