# probes/together-ai.yaml
# Reference: https://docs.together.ai/reference/models-1
name: together-ai
description: Together AI cloud inference platform for open-source models
category: cloud-managed
port_hint: 443
specificity: 85
api_docs: https://docs.together.ai/reference/models-1

requests:
  # Together-specific: /v1/hardware 401 error references api.together.xyz domain.
  - type: http
    path: /v1/hardware
    method: GET
    match:
      - type: body.contains
        value: "You can find your API key at https://api.together.xyz"

  # Together-specific: authenticated model list includes "pricing" object
  # with Together-unique subfields (hourly/input/output/base/finetune).
  - type: http
    path: /v1/models
    method: GET
    match:
      - type: status
        value: 200
      - type: content-type
        value: application/json
      - type: body.contains
        value: '"pricing"'
      - type: body.contains
        value: '"finetune"'
      - type: body.contains
        value: '"organization"'

models:
  path: /v1/models
  method: GET
  extract: ".[].id"

augustus:
  generator: openai
  config_template:
    endpoint: "$TARGET"
    model: "$MODEL"
    api_key: "$API_KEY"
    timeout: 180
